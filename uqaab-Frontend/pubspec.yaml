name: uqaab
description: Drone-Based Boundary Monitoring & Surveillance System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── State Management ────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── HTTP / Networking ────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  http: ^1.2.1
  web_socket_channel: ^3.0.3

  # ── Secure Storage ──────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Image ───────────────────────────────────────────────────────────────────
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1

  # ── Video / Live Stream ──────────────────────────────────────────────────────
  video_player: ^2.8.6
  chewie: ^1.8.1
  flutter_vlc_player: ^7.4.2
  ffmpeg_kit_flutter_minimal: ^6.0.8
  flutter_mjpeg: ^2.0.4

  # ── Maps ────────────────────────────────────────────────────────────────────
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0

  # ── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.1.2

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  equatable: ^2.0.5

  # ── Icons / UI ──────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter_18pt-Bold.ttf
        weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  min_sdk_android: 21
  image_path: assets/images/eagle_logo.png

  # ── Adaptive Icon (Android 8.0+) — gives circular look ──────────────────────
  adaptive_icon_background: "#F0EDE8"        # beige/cream — matches your splash
  adaptive_icon_foreground: assets/images/eagle_logo.png
  adaptive_icon_round: assets/images/eagle_logo.png   # forces round icon shape
  icon_image_scale: 0.82

  # ── iOS ─────────────────────────────────────────────────────────────────────
  remove_alpha_ios: true                     # required — iOS doesn't allow transparency

dependency_overrides:
  http: ^1.2.1